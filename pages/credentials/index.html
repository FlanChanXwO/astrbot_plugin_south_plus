<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>South Plus 凭证管理</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main>
      <header>
        <h1>South Plus 凭证管理</h1>
        <button id="refresh">刷新</button>
      </header>
      <section class="panel">
        <h2>新增或更新</h2>
        <form id="credential-form">
          <label>用户 ID<input name="user_key" required /></label>
          <label>消息会话 Origin<input name="unified_msg_origin" required /></label>
          <label>South Plus 用户名<input name="username" /></label>
          <label>Cookie<input name="cookie" /></label>
          <label>定时 HH:MM<input name="schedule_time" placeholder="03:30" /></label>
          <label class="inline"><input name="enabled" type="checkbox" checked /> 启用</label>
          <button type="submit">保存</button>
        </form>
      </section>
      <section class="panel">
        <h2>已保存凭证</h2>
        <div id="status"></div>
        <table>
          <thead>
            <tr>
              <th>用户</th>
              <th>账号</th>
              <th>Cookie</th>
              <th>启用</th>
              <th>定时</th>
              <th>上次结果</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </section>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
