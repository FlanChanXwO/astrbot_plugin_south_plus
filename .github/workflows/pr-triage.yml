name: PR Triage

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure triage labels exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh label create "area: docs" --repo "$REPO" --color "0E8A16" --description "Documentation changes" || true
          gh label create "area: frontend" --repo "$REPO" --color "1D76DB" --description "Plugin Pages or frontend changes" || true
          gh label create "area: backend" --repo "$REPO" --color "5319E7" --description "Backend or core runtime changes" || true
          gh label create "area: tests" --repo "$REPO" --color "C5DEF5" --description "Test changes" || true
          gh label create "area: github-actions" --repo "$REPO" --color "FBCA04" --description "GitHub workflow or repository automation changes" || true
          gh label create "release" --repo "$REPO" --color "BFD4F2" --description "Release metadata or changelog changes" || true

      - name: Apply path labels
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml

      - name: Assign maintainer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr edit "$PR_URL" --add-assignee FlanChanXwO
