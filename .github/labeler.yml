"area: docs":
  - changed-files:
      - any-glob-to-any-file:
          - "README.md"
          - "CHANGELOG.md"
          - "AGENTS.md"
          - "CLAUDE.md"
          - "docs/**"

"area: frontend":
  - changed-files:
      - any-glob-to-any-file:
          - "pages/**"

"area: backend":
  - changed-files:
      - any-glob-to-any-file:
          - "main.py"
          - "bootstrap.py"
          - "src/**"

"area: tests":
  - changed-files:
      - any-glob-to-any-file:
          - "tests/**"

"area: github-actions":
  - changed-files:
      - any-glob-to-any-file:
          - ".github/**"

"release":
  - changed-files:
      - any-glob-to-any-file:
          - "metadata.yaml"
          - "CHANGELOG.md"
