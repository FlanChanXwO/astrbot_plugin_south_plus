<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>South Plus 登录</title>
  <style>
    :root {
      --sp-blue: #4a90e2;
      --sp-blue-dark: #2f6fbf;
      --sp-blue-soft: #6699cc;
      --sp-blue-light: #e8f1fb;
      --sp-text: #1f2937;
      --sp-muted: #5b6b7c;
      --sp-border: #cfd8e3;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      margin: 0;
      padding: 2rem 1rem;
      color: var(--sp-text);
      background: linear-gradient(180deg, var(--sp-blue-light) 0%, #ffffff 60%);
      min-height: 100vh;
    }
    main {
      max-width: 460px;
      margin: 0 auto;
      background: #ffffff;
      border: 1px solid var(--sp-border);
      border-radius: 14px;
      padding: 24px 28px 28px;
      box-shadow: 0 6px 20px rgba(74, 144, 226, 0.12);
      text-align: center;
    }
    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      margin-bottom: 18px;
    }
    .brand img {
      max-width: 240px;
      width: 100%;
      height: auto;
      display: block;
    }
    h1 {
      font-size: 1.25rem;
      margin: 4px 0 0;
      color: var(--sp-blue-dark);
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    p {
      color: var(--sp-muted);
      line-height: 1.7;
      margin: 12px 0 0;
    }
    .icon {
      font-size: 2rem;
      color: var(--sp-blue);
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <main>
    <div class="brand">
      <img src="/assets/logo.png" alt="South Plus">
      <h1>South Plus 登录</h1>
    </div>
    <div class="icon">⏳</div>
    <p>链接不存在或已过期。</p>
    <p>请回到聊天窗口重新发起 <code>/splogin</code>。</p>
  </main>
</body>
</html>
